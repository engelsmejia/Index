<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juegos</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .galeria {
      display: flex;
      flex-wrap: wrap;        /* Hace que salten a otra línea si no caben */
      gap: 15px;              /* Espacio entre imágenes */
      justify-content: center;/* Centra las imágenes */
    }

    .juego {
      width: 300px;           /* Tamaño fijo de cada bloque */
      text-align: center;
      border-radius: 10px;
      overflow: hidden;
      background: #111;
    }

    .juego img {
      width: 100%;
      height: 180px;
      object-fit: cover;      /* Ajusta sin deformar */
    }

    .juego h3 {
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <h1>Mis Juegos</h1>

  <div class="galeria">
    <div class="juego">
      <img src="fortnite.jpg" alt="Fortnite">
      <h3>Fortnite</h3>
    </div>

    <div class="juego">
      <img src="counter-strike.jpg" alt="Counter Strike">
      <h3>Counter Strike</h3>
    </div>

    <div class="juego">
      <img src="assassins-creed.jpg" alt="Assassin's Creed">
      <h3>Assassin’s Creed</h3>
    </div>
  </div>

  

</body>
</html>
